unbind C-b # Unbind default prefix
set -g prefix C-a # Remap new prefix
bind C-a send-prefix # Press C-a twice to use C-a

bind R source-file ~/.config/tmux/tmux.conf \; display-message "config reloaded." # Reload config

bind z set-option -g status # Hide Status bar
bind enter resize-pane -Z # Maximize current pane
bind k copy-mode
bind P new-window -n pwsh "pwsh.exe"

# Open btm in floating popup at top-right (requires tmux 3.2+)
if -F '#{>=:#{version},3.2}' {
  bind B popup -w30% -h30% -xR -yS -EB 'btm -e'
}

unbind '"' # Unbind split horizontal
unbind % # Unbind split vertical
bind - split-window -v # Split horizontal
bind \\ split-window -h # Split verical
bind _ split-window -c "#{pane_current_path}" -v # Split horizontal (dupplicate)
bind | split-window -c "#{pane_current_path}" -h # Split verical (dupplicate)

set -w -g mode-keys vi # Use vi-binding in copy-mode
bind -T copy-mode-vi i    send -X cancel
bind -T copy-mode-vi v    send -X begin-selection
bind -T copy-mode-vi C-v  send -X rectangle-toggle
bind -T copy-mode-vi y    send -X copy-selection
bind -T copy-mode-vi Y    send -X copy-line-and-cancel
bind / copy-mode \; send-keys / # Quick search

# Kill pane/window without ask
bind x kill-pane
bind q kill-window

# New window and retain cwd
bind 'C-c' customize-mode
bind C new-window -c "#{pane_current_path}"

bind N new-session

# Windows navigation
bind o select-window -l # other window aka last window
bind l select-window -n # left window
bind h select-window -p # right window

# Panes navigation
bind Tab select-pane -l -Z
bind 'C-h' select-pane -L
bind 'C-j' select-pane -D
bind 'C-k' select-pane -U
bind 'C-l' select-pane -R

set -g status-interval 60
set -sg escape-time 100
set -g focus-events on

set -g base-index 1
set -w -g pane-base-index 1

# Enable True Color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse
set -g mouse on

# move status line to top
set -g status-position top

# To prevent sourcing .bash_profile in every tmux instance
set -g default-command /bin/bash

set -g pane-border-lines heavy
set -gq pane-border-indicators arrows

# Make prefix visible
set -g status-right ' #{?client_prefix,#[reverse]<Prefix>#[noreverse] ,}"#{=21:pane_title}" %H:%M %d-%b-%y'
